<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SAAI Demo Prototype</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="nav">
      <div class="brand">SAAI <span class="accent">TERMINAL</span></div>
      <div class="meta">市场洞察</div>
      <div class="controls">
        <button id="langBtn" class="toggle-btn lang-btn" title="切换语言">中</button>
        <button id="proBtn" class="toggle-btn pro-btn" title="切换专业/免费版">FREE</button>
      </div>
    </header>

    <main class="container">
      <section class="hero">
        <div class="loader" id="loader">AI 正在扫描市场环境...</div>
      </section>

      <!-- SPA Pages container -->
      <nav class="breadcrumb" id="mainNav" style="display:none;">
        <button class="nav-btn" data-page="page1">首页</button>
        <button class="nav-btn" data-page="page2">情景判断</button>
        <button class="nav-btn" data-page="page3">AI 组合</button>
        <button class="nav-btn" data-page="page4">策略详情</button>
        <button class="nav-btn" data-page="page5">动态调仓</button>
        <button class="nav-btn" data-page="page6">商业模式</button>
        <button class="nav-btn" data-page="page7">竞品分析</button>
        <button class="nav-btn" data-page="page8">个人中心</button>
      </nav>

      <section id="pages" style="display:none;">
        <!-- Page 1: Home / User Config -->
        <section id="page1" class="page">
          <h2>首页 — 用户配置</h2>
          <div class="card form-card">
            <div class="form-row">
              <label>用户身份</label>
              <select id="inputUser">
                <option value="">请选择身份</option>
                <option value="cn">大陆散户</option>
                <option value="hk">香港北上投 A 股 散户</option>
              </select>
            </div>
            <div class="form-row">
              <label>风险等级</label>
              <div id="riskOptions" class="options">
                <label><input type="radio" name="risk" value="conservative"> 保守</label>
                <label><input type="radio" name="risk" value="moderate"> 稳健</label>
                <label><input type="radio" name="risk" value="balanced"> 平衡</label>
                <label><input type="radio" name="risk" value="aggressive"> 进取</label>
                <label><input type="radio" name="risk" value="very"> 激进</label>
              </div>
            </div>
            <div class="form-row">
              <label>投资期限</label>
              <div id="termOptions" class="options">
                <label><input type="radio" name="term" value="short"> 短期（<1 月）</label>
                <label><input type="radio" name="term" value="mid"> 中期（1-6 月）</label>
                <label><input type="radio" name="term" value="long"> 长期（>6 月）</label>
              </div>
            </div>
            <div class="form-row actions">
              <button id="genBtn" class="primary" disabled>一键生成 AI 策略</button>
              <button id="resetBtn">重置</button>
            </div>
            <div class="compliance">合规提示：仅支持 A 股 + 场内 ETF。核心约束：单股≤20%，行业≤40%，持仓≥7 天，现金≥10%。</div>
          </div>
        </section>

        <!-- Page 2: Scenarios -->
        <section id="page2" class="page" style="display:none;">
          <h2>市场情景判断</h2>
          <div class="card">
            <div id="scenarioList" class="scenario-list"></div>
            <div id="scenarioDetail" class="scenario-detail"></div>
          </div>
        </section>

        <!-- Page 3: Strategy -->
        <section id="page3" class="page" style="display:none;">
          <h2>AI 组合策略</h2>
          <div class="card">
            <div id="strategySummary"></div>
            <div id="assetList"></div>
            <div id="complianceStatus" class="compliance"></div>
          </div>
        </section>

        <!-- Page 4: Strategy Details -->
        <section id="page4" class="page" style="display:none;">
          <h2>策略详情（可解释 AI）</h2>
          <div class="card" id="strategyDetails"></div>
        </section>

        <!-- Page 5: Rebalance / Lock -->
        <section id="page5" class="page" style="display:none;">
          <h2>动态调仓提醒</h2>
          <div class="card">
            <div id="lockBox"></div>
            <div style="margin-top:12px"><button id="refreshSim">刷新模拟</button></div>
            <div id="rebalanceHistory" style="margin-top:12px"></div>
          </div>
        </section>

        <!-- Page 6: Business Model -->
        <section id="page6" class="page" style="display:none;">
          <h2>商业模式</h2>
          <div class="card">
            <div id="membershipBox"></div>
            <div id="revenueBox" style="margin-top:12px"></div>
          </div>
        </section>

        <!-- Page 7: Competitor Analysis -->
        <section id="page7" class="page" style="display:none;">
          <h2>竞品分析</h2>
          <div class="card" id="competitors"></div>
        </section>

        <!-- Page 8: Profile -->
        <section id="page8" class="page" style="display:none;">
          <h2>个人中心</h2>
          <div class="card" id="profileBox"></div>
        </section>
      </section>

      <footer class="foot">© Group B16</footer>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
